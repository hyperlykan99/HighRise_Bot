kind = "web"
previewPath = "/dj-status/"
title = "DJ DUDU Status"
version = "1.0.0"
id = "artifacts/dj-status"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dj-status/" ]
localPort = 25976

[services.development]
run = "pnpm --filter @workspace/dj-status run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dj-status", "run", "build" ]
publicDir = "artifacts/dj-status/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25976"
BASE_PATH = "/dj-status/"
